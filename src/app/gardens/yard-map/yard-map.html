<figure class="yard-map">
  <!--
    Zoom controls overlaid on top of the map. Buttons update the view
    signals which the SVG's viewBox is bound to, so changes propagate
    automatically.
  -->
  <div class="yard-map__controls">
    <button
      type="button"
      class="yard-map__control"
      (click)="zoomIn()"
      aria-label="Zoom in"
      title="Zoom in"
    >
      +
    </button>
    <button
      type="button"
      class="yard-map__control"
      (click)="zoomOut()"
      aria-label="Zoom out"
      title="Zoom out"
    >
      −
    </button>
    <button
      type="button"
      class="yard-map__control"
      (click)="fitAll()"
      aria-label="Fit all gardens"
      title="Fit all"
    >
      ⊡
    </button>
  </div>

  <svg
    #svgEl
    class="yard-map__svg"
    [class.yard-map__svg--panning]="isPanning()"
    [attr.viewBox]="viewBox()"
    preserveAspectRatio="xMidYMid meet"
    xmlns="http://www.w3.org/2000/svg"
    (pointerdown)="onBackgroundPointerDown($event)"
    (pointermove)="onBackgroundPointerMove($event)"
    (pointerup)="onBackgroundPointerUp($event)"
    (pointercancel)="onBackgroundPointerUp($event)"
    (wheel)="onWheel($event)"
  >
    <!--
      Grid pattern: a 1×1 tile (1ft × 1ft) with an L-shaped line at the
      top + left edges. SVG tiles this across the background rect. The
      second pattern is heavier and tiles every 10 ft for orientation.
    -->
    <defs>
      <pattern
        id="yard-grid"
        width="1"
        height="1"
        patternUnits="userSpaceOnUse"
      >
        <path
          d="M 1 0 L 0 0 L 0 1"
          fill="none"
          stroke="#e7e5e4"
          stroke-width="0.05"
        />
      </pattern>
      <pattern
        id="yard-grid-major"
        width="10"
        height="10"
        patternUnits="userSpaceOnUse"
      >
        <path
          d="M 10 0 L 0 0 L 0 10"
          fill="none"
          stroke="#a8a29e"
          stroke-width="0.08"
        />
      </pattern>
    </defs>

    <!--
      Background grid tracks the visible view, so wherever the user
      zooms or pans to, the grid is always painted under it. The fine
      and major patterns layer.
    -->
    <rect
      [attr.x]="viewX()"
      [attr.y]="viewY()"
      [attr.width]="viewWidth()"
      [attr.height]="viewHeight()"
      fill="url(#yard-grid)"
    />
    <rect
      [attr.x]="viewX()"
      [attr.y]="viewY()"
      [attr.width]="viewWidth()"
      [attr.height]="viewHeight()"
      fill="url(#yard-grid-major)"
    />

    <!--
      Live preview of the rectangle being drawn (Shift+drag on
      background). pointer-events: none so the preview doesn't capture
      pointermove and let it keep flowing to the SVG-level handlers.
    -->
    @if (isDrawing()) {
      <rect
        [attr.x]="drawX()"
        [attr.y]="drawY()"
        [attr.width]="drawW()"
        [attr.height]="drawH()"
        class="yard-map__draw-preview"
      />
    }

    @for (garden of gardens(); track garden.id) {
      @let isDragging = draggingId() === garden.id;
      @let isResizing = resizingId() === garden.id;
      @let x = isResizing ? resizeX() : isDragging ? dragX() : garden.position_x_ft;
      @let y = isResizing ? resizeY() : isDragging ? dragY() : garden.position_y_ft;
      @let w = isResizing ? resizeW() : garden.width_ft;
      @let h = isResizing ? resizeH() : garden.height_ft;
      <g
        class="yard-map__garden"
        [class.yard-map__garden--dragging]="isDragging"
        [class.yard-map__garden--resizing]="isResizing"
      >
        <rect
          [attr.x]="x"
          [attr.y]="y"
          [attr.width]="w"
          [attr.height]="h"
          class="yard-map__rect"
          (pointerdown)="onPointerDown($event, garden)"
          (pointermove)="onPointerMove($event)"
          (pointerup)="onPointerUp($event)"
          (pointercancel)="onPointerUp($event)"
        />
        <text
          [attr.x]="x + w / 2"
          [attr.y]="y + h / 2"
          text-anchor="middle"
          dominant-baseline="middle"
          class="yard-map__label"
        >
          {{ garden.name }}
        </text>

        <!--
          Four corner resize handles. Each is a small square centered on
          a corner of the garden rect. Cursors hint at the resize axis;
          the handler computes the new box with the OPPOSITE corner fixed.
        -->
        <rect
          [attr.x]="x - handleSize / 2"
          [attr.y]="y - handleSize / 2"
          [attr.width]="handleSize"
          [attr.height]="handleSize"
          class="yard-map__handle yard-map__handle--nw"
          (pointerdown)="onResizeStart($event, garden, 'nw')"
          (pointermove)="onResizeMove($event)"
          (pointerup)="onResizeEnd($event)"
          (pointercancel)="onResizeEnd($event)"
        />
        <rect
          [attr.x]="x + w - handleSize / 2"
          [attr.y]="y - handleSize / 2"
          [attr.width]="handleSize"
          [attr.height]="handleSize"
          class="yard-map__handle yard-map__handle--ne"
          (pointerdown)="onResizeStart($event, garden, 'ne')"
          (pointermove)="onResizeMove($event)"
          (pointerup)="onResizeEnd($event)"
          (pointercancel)="onResizeEnd($event)"
        />
        <rect
          [attr.x]="x - handleSize / 2"
          [attr.y]="y + h - handleSize / 2"
          [attr.width]="handleSize"
          [attr.height]="handleSize"
          class="yard-map__handle yard-map__handle--sw"
          (pointerdown)="onResizeStart($event, garden, 'sw')"
          (pointermove)="onResizeMove($event)"
          (pointerup)="onResizeEnd($event)"
          (pointercancel)="onResizeEnd($event)"
        />
        <rect
          [attr.x]="x + w - handleSize / 2"
          [attr.y]="y + h - handleSize / 2"
          [attr.width]="handleSize"
          [attr.height]="handleSize"
          class="yard-map__handle yard-map__handle--se"
          (pointerdown)="onResizeStart($event, garden, 'se')"
          (pointermove)="onResizeMove($event)"
          (pointerup)="onResizeEnd($event)"
          (pointercancel)="onResizeEnd($event)"
        />
      </g>
    }
  </svg>
  <figcaption class="yard-map__legend">
    1 square = 1 ft · drag a garden to reposition · Shift+drag on the grid
    to add a new garden
  </figcaption>
</figure>
