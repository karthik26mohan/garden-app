name: Production Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Database migrations -----------------------------------------------
      - name: Link Supabase project
        run: pnpm supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply migrations to production
        run: pnpm supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # --- App deploy --------------------------------------------------------
      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      # --- Smoke test --------------------------------------------------------
      - name: Smoke test /api/health
        run: |
          set -e
          URL="${{ steps.deploy.outputs.url }}"
          echo "Checking $URL/api/health"
          for i in 1 2 3 4 5; do
            if curl -fsS "$URL/api/health" | grep -q '"ok":true'; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s…"
            sleep 3
          done
          echo "✗ Health check failed after 5 attempts"
          exit 1

      - name: Smoke test home page
        run: |
          set -e
          URL="${{ steps.deploy.outputs.url }}"
          curl -fsS "$URL" -o /dev/null
          echo "✓ Home page returned 200"
